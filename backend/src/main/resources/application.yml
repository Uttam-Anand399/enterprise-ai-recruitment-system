server:
  port: 8080

spring:
  application:
    name: enterprise-ai-recruitment-backend

  datasource:
    url: jdbc:mysql://localhost:3307/recruitment_platform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Tiwari@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    open-in-view: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:replace-with-a-strong-256-bit-secret}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

services:
  ai:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:5000}
